services:
  - type: cron-job
    name: multi-asset-ema-bot
    schedule: "*/3 * * * *"  # Every 3 minutes
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: CHAT_ID
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
